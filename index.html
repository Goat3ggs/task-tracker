<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/main.css" />
    <title>Task Tracker</title>
  </head>
  <body>
    <main class="container">
      <!-- Later Implementation
        <nav class="sidebar">
        <h1>Task Tracker</h1>
        <ul class="list">
          <li class="list__item">
            <a href="#" class="list__link">Dashboard</a>
          </li>
        </ul>
      </nav> -->
      <header class="header">
        <h1 class="header__title">Task Tracker</h1>
      </header>

      <section class="filters">
        <div class="filter-btns">
          <button class="filters__btn all" data-filter="all">All</button>
          <button class="filters__btn active" data-filter="active">
            Active
          </button>
          <button class="filters__btn completed" data-filter="completed">
            Completed
          </button>
        </div>

        <div class="group">
          <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
            <g>
              <path
                d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z"
              ></path>
            </g>
          </svg>
          <input
            placeholder="Search"
            type="text"
            class="search-input"
            data-search
          />
        </div>
      </section>

      <section class="content">
        <form class="task-form">
          <input
            class="task-form__input"
            type="text"
            placeholder="Today Task"
          />
          <button class="task-form__button" type="submit">Add</button>
        </form>

        <ul class="task-list"></ul>
      </section>
    </main>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
